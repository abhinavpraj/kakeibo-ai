stages:
  - test
  - lint
  - format
  - type_check
  - coverage

include:
  - template: Security/Secret-Detection.gitlab-ci.yml

test:
  stage: test
  image: python:3.11
  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
  script:
    - pytest tests/

lint:
  stage: lint
  image: python:3.11
  before_script:
    - pip install ruff
  script:
    - ruff check .

format:
  stage: format
  image: python:3.11
  before_script:
    - pip install ruff
  script:
    - ruff format --check .

type_check:
  stage: type_check
  image: python:3.11
  before_script:
    - pip install -r requirements.txt
    - pip install mypy pandas-stubs
  script:
    - mypy . --ignore-missing-imports

coverage:
  stage: coverage
  image: python:3.11
  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
  script:
    - pytest --cov=database --cov=auth --cov-report=term --cov-report=xml --cov-fail-under=60 tests/
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

dependency_audit:
  stage: test
  image: python:3.11
  before_script:
    - pip install pip-audit
  script:
    - pip-audit -r requirements.txt

static_analysis:
  stage: test
  image: python:3.11
  before_script:
    - pip install bandit
  script:
    - bandit -r app.py database.py insights.py i18n.py
