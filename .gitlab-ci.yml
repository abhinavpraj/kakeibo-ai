stages:
  - lint
  - security
  - test

.python_env:
  before_script:
    - if [ ! -d ".venv" ]; then python3 -m venv .venv; fi
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

py_compile:
  stage: lint
  tags:
    - python
  script:
    - find . -name "*.py" -not -path "*/.venv/*" -not -path "*/scratch/*" -exec python3 -m py_compile {} +

ruff:
  stage: lint
  extends: .python_env
  tags:
    - python
  script:
    - ruff check .

bandit:
  stage: security
  extends: .python_env
  tags:
    - python
  script:
    - pip install bandit
    - bandit -r . -x ./.venv/,./scratch/,./tests/

pip_audit:
  stage: security
  extends: .python_env
  tags:
    - python
  script:
    - pip install pip-audit
    - pip-audit -r requirements.txt

gitleaks:
  stage: security
  tags:
    - python
  script:
    - export PATH="/opt/homebrew/bin:$PATH"
    - gitleaks detect --source=. -v

test:
  stage: test
  extends: .python_env
  tags:
    - python
  script:
    - if [ -d "tests" ]; then pytest --cov=database --cov=auth --cov-report=term --cov-report=xml --cov-fail-under=60 tests/; else echo "No tests directory found, skipping gracefully"; fi
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
