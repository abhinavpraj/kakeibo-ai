stages:
  - format
  - lint
  - type_check
  - test
  - coverage

default:
  image: python:3.12

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .venv/

.python_env:
  before_script:
    - if [ ! -d ".venv" ]; then python3 -m venv .venv; fi
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

format:
  stage: format
  extends: .python_env
  script:
    - .venv/bin/ruff format --check --no-cache .

lint:
  stage: lint
  extends: .python_env
  script:
    - .venv/bin/ruff check --no-cache .

type_check:
  stage: type_check
  extends: .python_env
  script:
    - .venv/bin/mypy .

static_analysis:
  stage: test
  extends: .python_env
  script:
    - .venv/bin/bandit -r . -x ./.venv/,./scratch/,./tests/

dependency_audit:
  stage: test
  extends: .python_env
  script:
    - .venv/bin/pip-audit -r requirements.txt

test:
  stage: test
  extends: .python_env
  script:
    - if [ -d "tests" ]; then PYTHONPATH=. .venv/bin/pytest tests/ -p no:cacheprovider --basetemp=./test_tmp; else echo "No tests found, skipping"; fi

secret_detection:
  stage: test
  image:
    name: gitleaks/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source=. -v

coverage:
  stage: coverage
  extends: .python_env
  script:
    - if [ -d "tests" ]; then PYTHONPATH=. .venv/bin/pytest --cov=database --cov=auth --cov-report=term --cov-report=xml --cov-fail-under=60 tests/ -p no:cacheprovider --basetemp=./test_tmp; else echo "No tests found, skipping"; fi
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
